name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── 1. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      # Hard stop: syntax errors, undefined names, invalid escape sequences
      - name: Lint — errors (blocking)
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

      # Style warnings: reported but non-blocking so the pipeline still passes
      - name: Lint — style (non-blocking)
        run: |
          flake8 . \
            --count \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exit-zero \
            --statistics

  # ── 2. Security Scan ─────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      # -ll  = report medium and high severity only
      # Skip venv and git dirs
      - name: Run bandit
        run: |
          bandit -r . \
            --exclude ./.git,./venv \
            -ll \
            --quiet

  # ── 3. Dependency Install ────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # pyodbc requires the unixODBC headers on Linux
      - name: Install system ODBC headers
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify key imports
        run: |
          python -c "import streamlit; import pandas; import pyodbc; import dotenv"
          echo "All imports resolved successfully."

  # ── 4. Tests (runs when test files exist) ───────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system ODBC headers
        run: sudo apt-get update -qq && sudo apt-get install -y unixodbc-dev

      - name: Install dependencies + pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt

      - name: Run tests
        run: |
          # Exit code 5 = "no tests collected" — treat as pass until tests are added
          python -m pytest --ignore=venv -q --tb=short; code=$?
          if [ $code -eq 5 ]; then
            echo "No test files found yet — skipping."
            exit 0
          fi
          exit $code
